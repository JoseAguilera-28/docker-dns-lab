services:
  dns-server:
    image: ubuntu/bind9:latest
    container_name: dns_master
    environment:
      - BIND9_USER=bind
    # ports:
      #   - "53:53/udp" 
      #   - "53:53/tcp"
    networks:
      backend_net:
        ipv4_address: 172.20.0.10
    volumes:
      - ./config/named.conf.options:/etc/bind/named.conf.options
      - ./config/named.conf.local:/etc/bind/named.conf.local
      - ./config/db.aguilera.org:/etc/bind/db.aguilera.org
    restart: unless-stopped

  cliente1:
    image: alpine:latest
    container_name: cliente_pruebas_1
    command: sh -c "apk add --no-cache bind-tools && sleep infinity"
    networks:
      - backend_net
    dns:
      - 172.20.0.10
    depends_on:
      - dns-server

  cliente2:
    image: alpine:latest
    container_name: cliente_pruebas_2
    command: sh -c "apk add --no-cache bind-tools && sleep infinity"
    networks:
      - backend_net
    dns:
      - 172.20.0.10
    depends_on:
      - dns-server

networks:
  backend_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16